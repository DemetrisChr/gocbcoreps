name: Run Integration Tests
permissions:
  contents: read
  packages: read

on:
  push:
    tags:
      - v*
    branches:
      - master
  pull_request:
jobs:
  test:
    name: Test
    strategy:
      matrix:
        server:
          - 8.1.0-1262
          - 8.0.0
          - 7.6.8
          - 7.2.8

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          path: gocbcoreps
      - name: Install cbdinocluster
        uses: ./gocbcoreps/.github/actions/install-cbdinocluster
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Start couchbase cluster
        id: start-cluster
        uses: ./gocbcoreps/.github/actions/start-couchbase-cluster
      - name: Install Stellar Gateway
        uses: actions/checkout@v4
        with:
          repository: couchbase/stellar-gateway
          submodules: recursive
          path: stellar-gateway
      - name: Check Files
        run: |
          ls
      - uses: actions/setup-go@v5
        with:
          go-version: 1.24
      - uses: arduino/setup-protoc@v3
        with:
          version: 31.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Tools
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5
          go install github.com/matryer/moq@v0.5
      - name: Install Dependencies
        run: |
          cd ./gocbcoreps
          go get ./...
          cd ../stellar-gateway
          go get ./...
          cd ..
      - name: Generate Files
        run: |
          cd ./gocbcoreps
          go generate ./...
          cd ../stellar-gateway
          go generate ./...
      - name: Run stellar gateway
        run: |
          cd stellar-gateway
          nohup go run ./cmd/gateway/main.go --log-level debug --cb-host ${{ steps.start-cluster.outputs.node-ip }} --self-sign > logs.txt 2>&1 &
      - name: Run Tests
        timeout-minutes: 10
        env:
          PSCONNSTR:  "localhost:18098"
          PSSRVCONNSTR: ${{ steps.start-cluster.outputs.node-ip }}
        run: |
          cd ./gocbcoreps
          go test . -v -race -p 1
      - name: Collect couchbase logs
        timeout-minutes: 10
        if: failure()
        run: |
          mkdir -p ./logs
          cbdinocluster -v collect-logs ${{ steps.start-cluster.outputs.dino-id }} ./logs
      - name: Upload couchbase logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cbcollect-logs-${{ matrix.server }}
          path: ./logs/*
          retention-days: 5
      - name: Upload stellar gateway logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stellar-gateway-logs-${{ matrix.server }}
          path: ./stellar-gateway/logs.txt
          retention-days: 5

